services:
  mysql-db:
    image: mysql:8.0
    container_name: bank_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bank_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: bank_user
      MYSQL_PASSWORD: bank_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: