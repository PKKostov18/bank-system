spring.application.name=bank-system

# Load local env files so developers do not need IDE run configuration variables.
# Supports running from both repo root and bank-system module directory.
spring.config.import=optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/bank-system/.env[.properties]

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3307/bank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=bank_user
spring.datasource.password=bank_password

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT settings (use env vars in production)
security.jwt.secret=${JWT_SECRET_BASE64:c3VwZXJzZWNyZXRzdXBlcnNlY3JldHN1cGVyc2VjcmV0MTIzNDU2}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}

# Dev bootstrap employee for onboarding endpoints
app.bootstrap.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:employee@bank.local}
app.bootstrap.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:Employee@123}

# Secret header value required by /api/admin/secret/onboarding/**
app.admin.secret=${APP_ADMIN_SECRET}

# Mail settings for temporary password delivery
# Default values work with local MailHog/Mailpit on port 1025
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=${APP_MAIL_FROM:no-reply@banksystem.com}

