spring.application.name=bank-system

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3307/bank_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=bank_user
spring.datasource.password=bank_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate – schema is managed by Flyway; Hibernate only validates it
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Flyway – automatically applies migrations from db/migration on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration